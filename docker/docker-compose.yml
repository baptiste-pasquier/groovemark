services:
  # Pocketbase backend service
  pocketbase:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pocketbase
      args:
        - PB_VERSION=0.34.2
    container_name: groovemark-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      # Persist Pocketbase data
      - pocketbase_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # GrooveMark Vue application
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: groovemark-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      # Point to the pocketbase service
      # Override this using .env file or docker-compose override
      - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL:-http://pocketbase:8090}
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pocketbase_data:
    driver: local
