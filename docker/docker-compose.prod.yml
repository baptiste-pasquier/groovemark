# Production Docker Compose Configuration
# Uses pre-built images from GitHub Container Registry

services:
  # Pocketbase backend service
  pocketbase:
    image: ghcr.io/baptiste-pasquier/groovemark-pocketbase:latest
    container_name: groovemark-pocketbase
    restart: unless-stopped
    ports:
      - '8090:8090'
    volumes:
      # Persist Pocketbase data
      - pocketbase_data:/pb/pb_data
      # Optional: Mount custom migrations and hooks
      # - ../pb_migrations:/pb/pb_migrations:ro
      # - ../pb_hooks:/pb/pb_hooks:ro
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8090/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - groovemark-network

  # GrooveMark Vue application
  app:
    image: ghcr.io/baptiste-pasquier/groovemark:latest
    container_name: groovemark-app
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - groovemark-network

  # Optional: Reverse proxy for production
  # nginx-proxy:
  #   image: nginx:alpine
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - app
  #     - pocketbase
  #   networks:
  #     - groovemark-network

networks:
  groovemark-network:
    driver: bridge

volumes:
  pocketbase_data:
    driver: local
