# Production Docker Compose Configuration
# This file shows a more production-ready setup with additional configuration

services:
  # Pocketbase backend service
  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    container_name: mixstash-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      # Persist Pocketbase data
      - pocketbase_data:/pb/pb_data
      # Optional: Mount custom migrations and hooks
      # - ./pb_migrations:/pb/pb_migrations:ro
      # - ./pb_hooks:/pb/pb_hooks:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mixstash-network

  # MixStash Vue application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL:-http://pocketbase:8090}
    container_name: mixstash-app
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - mixstash-network

  # Optional: Reverse proxy for production
  # nginx-proxy:
  #   image: nginx:alpine
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - app
  #     - pocketbase
  #   networks:
  #     - mixstash-network

networks:
  mixstash-network:
    driver: bridge

volumes:
  pocketbase_data:
    driver: local
